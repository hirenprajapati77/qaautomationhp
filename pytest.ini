[pytest]
markers =
    api: API automation tests
    e2e: End-to-end UI tests (Playwright)
    ml: ML model validation tests
    rag: Agentic RAG pipeline evaluation tests
    quality_gate: Tests that feed the quality gate report

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -v --strict-markers
