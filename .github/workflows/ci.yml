name: QA Automation & Agentic RAG Evaluation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-and-ml-and-rag-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ML model validation tests
        run: pytest -m ml --html=reports/ml-report.html --self-contained-html

      - name: Run Multi-Agent RAG evaluation tests
        run: pytest -m rag --html=reports/rag-report.html --self-contained-html

      - name: Run API automation tests
        run: pytest -m api --html=reports/api-report.html --self-contained-html

      - name: Enforce Quality Gates
        run: python scripts/run_quality_gates.py

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run E2E Playwright tests
        run: pytest -m e2e --html=reports/e2e-report.html --self-contained-html

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: reports/
